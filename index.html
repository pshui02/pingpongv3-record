<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="乒乓紀錄">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="manifest" href='data:application/manifest+json,{"name":"乒乓全能紀錄系統","short_name":"乒乓紀錄","start_url":".","display":"standalone","background_color":"#f4f7f9","theme_color":"#1a73e8","orientation":"portrait","icons":[{"src":"icon.png","sizes":"192x192","type":"image/png"},{"src":"icon.png","sizes":"512x512","type":"image/png"}]}'>

    <title>🏓 乒乓全能紀錄</title>

    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #1a73e8; margin-bottom: 20px; padding-bottom: 10px; }
        .section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; margin: 10px 0; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { cursor: pointer; border: none; font-weight: bold; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-success { background: #34a853; color: white; width: 100%; margin-top: 10px; height: 45px; }
        .btn-danger { background: #ea4335; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-edit { background: #fbbc05; color: black; padding: 5px 10px; font-size: 12px; }
        .player-item { background: #f8f9fa; border: 1px solid #e0e0e0; padding: 8px 12px; border-radius: 10px; display: flex; align-items: center; gap: 8px; margin: 5px; }
        .mode-box { display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px; }
        .mode-btn { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .mode-btn.active { background: white; color: #1a73e8; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .scroll-x { overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 10px; }
        th { background: #f1f3f4; }
        .has-val { background: #e6f4ea; font-weight: bold; }
        .log-box { max-height: 250px; overflow-y: auto; background: #fafafa; border-radius: 8px; padding: 10px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🏓 乒乓全能紀錄系統</h1></div>

    <div class="section">
        <h3>1. 球員管理</h3>
        <div class="flex-row">
            <input type="text" id="newPlayer" placeholder="新球員姓名" style="flex:1">
            <button class="btn-primary" onclick="addPlayer()">加入</button>
            <button onclick="clearAll()" style="background:#666; color:white">全部重置</button>
        </div>
        <div id="playerList" class="flex-row"></div>
    </div>

    <div class="section">
        <h3>2. 紀錄比賽</h3>
        <div class="mode-box">
            <div id="mSingle" class="mode-btn active" onclick="switchMode('single')">單打</div>
            <div id="mDouble" class="mode-btn" onclick="switchMode('double')">雙打</div>
        </div>
        <div id="matchInputs" class="flex-row"></div>
        <button class="btn-success" onclick="saveMatch()">✅ 紀錄對賽</button>
    </div>

    <div class="section">
        <h3>📊 單打矩陣統計</h3>
        <div class="scroll-x"><table id="matrix"></table></div>
    </div>

    <div class="section">
        <h3>👫 雙打搭檔排行</h3>
        <div id="doubleRank" style="text-align:center; color:#888;">暫無紀錄</div>
    </div>

    <div class="section" style="border:none">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3>📝 歷史紀錄</h3>
            <button onclick="exportCSV()" style="background:#fbbc05; padding: 10px 15px; border-radius: 8px;">📥 匯出完整 CSV</button>
        </div>
        <div id="historyLog" class="log-box"></div>
    </div>
</div>

<script>
    // ==========================================
    // 註冊內嵌式 Service Worker
    // ==========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                const CACHE_NAME = 'pingpong-v20-cache';
                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll(['./', 'index.html', 'icon.png']);
                        }).then(() => self.skipWaiting())
                    );
                });
                self.addEventListener('activate', (e) => {
                    e.waitUntil(
                        caches.keys().then((keys) => {
                            return Promise.all(
                                keys.map((k) => { if(k !== CACHE_NAME) return caches.delete(k); })
                            );
                        }).then(() => self.clients.claim())
                    );
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        fetch(e.request).catch(() => caches.match(e.request))
                    );
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl, { scope: './' })
                .then(reg => console.log('PWA SW Registered'))
                .catch(err => console.log('PWA SW Failed', err));
        });
    }

    // ==========================================
    // 核心數據庫邏輯
    // ==========================================
    let db = JSON.parse(localStorage.getItem('pingpong_v11')) || {
        players: [],
        totals: {},      
        singleTotals: {}, 
        vs: {},
        pairs: {},
        logs: []
    };
    let currentMode = 'single';

    function addPlayer() {
        const input = document.getElementById('newPlayer');
        const name = input.value.trim();
        if (name && !db.players.includes(name)) {
            db.players.push(name);
            db.totals[name] = 0;
            db.singleTotals[name] = 0;
            input.value = '';
            refresh();
        }
    }

    function editPlayer(oldName) {
        const newName = prompt(`將「${oldName}」修改為：`, oldName);
        if (newName && newName.trim() !== "" && newName !== oldName) {
            const trimmedName = newName.trim();
            db.players = db.players.map(p => p === oldName ? trimmedName : p);
            db.logs.forEach(l => {
                if(l.p1 === oldName) l.p1 = trimmedName;
                if(l.p2 === oldName) l.p2 = trimmedName;
                if(l.p3 === oldName) l.p3 = trimmedName;
                if(l.p4 === oldName) l.p4 = trimmedName;
            });
            recalculateStats();
            refresh();
        }
    }

    function deletePlayer(name) {
        if (confirm(`確定要刪除「${name}」嗎？相關紀錄會被過濾！`)) {
            db.players = db.players.filter(p => p !== name);
            db.logs = db.logs.filter(l => l.p1 !== name && l.p2 !== name && l.p3 !== name && l.p4 !== name);
            recalculateStats();
            refresh();
        }
    }

    function recalculateStats() {
        db.vs = {}; db.pairs = {}; 
        db.totals = {}; db.singleTotals = {};
        db.players.forEach(p => { db.totals[p] = 0; db.singleTotals[p] = 0; });

        db.logs.forEach(l => {
            const p1Exist = db.players.includes(l.p1);
            const p2Exist = db.players.includes(l.p2);
            
            if (l.mode === 'single') {
                if (p1Exist && p2Exist) {
                    db.totals[l.p1]++;
                    db.totals[l.p2]++;
                    db.singleTotals[l.p1]++;
                    db.singleTotals[l.p2]++;
                    const key = [l.p1, l.p2].sort().join(" v ");
                    db.vs[key] = (db.vs[key] || 0) + 1;
                }
            } else {
                const p3Exist = db.players.includes(l.p3);
                const p4Exist = db.players.includes(l.p4);
                if (p1Exist && p2Exist && p3Exist && p4Exist) {
                    [l.p1, l.p2, l.p3, l.p4].forEach(p => db.totals[p]++);
                    const kA = [l.p1, l.p2].sort().join(" & ");
                    const kB = [l.p3, l.p4].sort().join(" & ");
                    db.pairs[kA] = (db.pairs[kA] || 0) + 1;
                    db.pairs[kB] = (db.pairs[kB] || 0) + 1;
                }
            }
        });
    }

    function switchMode(m) {
        currentMode = m;
        document.getElementById('mSingle').className = m === 'single' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('mDouble').className = m === 'double' ? 'mode-btn active' : 'mode-btn';
        renderInputs();
    }

    function renderInputs() {
        const area = document.getElementById('matchInputs');
        if (db.players.length === 0) {
            area.innerHTML = `<span style="color:#999;font-size:14px;">請先在上方加入球員</span>`;
            return;
        }
        const opt = db.players.map(p => `<option value="${p}">${p}</option>`).join('');
        if (currentMode === 'single') {
            area.innerHTML = `<select id="s1">${opt}</select> <b>VS</b> <select id="s2">${opt}</select>`;
        } else {
            area.innerHTML = `<div style="border:1px solid #ddd;padding:8px;border-radius:8px;display:inline-block;">A組:<br><select id="s1">${opt}</select><br><select id="s2">${opt}</select></div>
                             <b>VS</b>
                             <div style="border:1px solid #ddd;padding:8px;border-radius:8px;display:inline-block;">B組:<br><select id="s3">${opt}</select><br><select id="s4">${opt}</select></div>`;
        }
    }

    function saveMatch() {
        const requiredPlayers = currentMode === 'single' ? 2 : 4;
        if (db.players.length < requiredPlayers) {
            return alert(`球員人數不足！${currentMode === 'single' ? '單' : '雙'}打至少需要 ${requiredPlayers} 位球員。`);
        }

        const s1 = document.getElementById('s1'), s2 = document.getElementById('s2');
        if(!s1 || !s2) return;

        const p1 = s1.value, p2 = s2.value;
        let p3 = null, p4 = null, team = [p1, p2];

        if (currentMode === 'double') {
            const s3 = document.getElementById('s3'), s4 = document.getElementById('s4');
            if(!s3 || !s4) return;
            p3 = s3.value; p4 = s4.value;
            team = [p1, p2, p3, p4];
        }

        if (new Set(team).size !== team.length) return alert("錯誤：球員不能重複選取！");

        db.logs.unshift({ id: Date.now(), mode: currentMode, p1, p2, p3, p4, time: new Date().toLocaleString('zh-HK') });
        recalculateStats();
        refresh();
    }

    function deleteLog(id) {
        if (confirm("確定撤銷這場對賽？")) {
            db.logs = db.logs.filter(l => l.id !== id);
            recalculateStats();
            refresh();
        }
    }

    function refresh() {
        localStorage.setItem('pingpong_v11', JSON.stringify(db));
        renderInputs();
        
        document.getElementById('playerList').innerHTML = db.players.length ? db.players.map(p => `
            <div class="player-item">
                <b>${p}</b> <span>(單:${db.singleTotals[p] || 0}/總:${db.totals[p] || 0})</span>
                <button class="btn-edit" onclick="editPlayer('${p}')">改名</button>
                <button class="btn-danger" onclick="deletePlayer('${p}')">刪</button>
            </div>`).join('') : '<span style="color:#888;font-size:14px;margin:10px;">目前沒有球員，請從上方新增。</span>';

        let mHtml = '<tr><th></th>' + db.players.map(p => `<th>${p}</th>`).join('') + '</tr>';
        db.players.forEach(r => {
            mHtml += `<tr><td><b>${r}</b></td>`;
            db.players.forEach(c => {
                if(r===c) mHtml += '<td>-</td>';
                else {
                    const count = db.vs[[r, c].sort().join(" v ")] || 0;
                    mHtml += `<td class="${count>0?'has-val':''}">${count}</td>`;
                }
            });
            mHtml += '</tr>';
        });
        document.getElementById('matrix').innerHTML = db.players.length ? mHtml : '<tr><td style="color:#888;padding:20px;">請先加入球員</td></tr>';

        const pairArr = Object.entries(db.pairs).sort((a,b)=>b[1]-a[1]);
        document.getElementById('doubleRank').innerHTML = pairArr.length ? 
            pairArr.map(e => `<span style="display:inline-block; margin:5px; padding:5px 10px; background:#fff3e0; border-radius:15px; font-size:13px">🏆 ${e[0]}：${e[1]} 次</span>`).join('') : "暫無紀錄";

        document.getElementById('historyLog').innerHTML = db.logs.length ? db.logs.map(l => {
            let matchText = "";
            if (l.mode === 'single') {
                matchText = `<b style="color:#1a73e8">${l.p1}</b> <span style="color:#999">VS</span> <b style="color:#1a73e8">${l.p2}</b>`;
            } else {
                matchText = `<span style="background:#e8f0fe;padding:2px 6px;border-radius:4px;">${l.p1} & ${l.p2}</span> <span style="color:#999">VS</span> <span style="background:#e8f0fe;padding:2px 6px;border-radius:4px;">${l.p3} & ${l.p4}</span>`;
            }
            return `
            <div class="log-item">
                <span><span style="font-weight:bold;color:${l.mode==='single'?'#1a73e8':'#34a853'}">[${l.mode==='single'?'單':'雙'}]</span> ${matchText}</span>
                <div><small style="color:#999; margin-right:8px">${l.time}</small>
                <button class="btn-danger" onclick="deleteLog(${l.id})">撤銷</button></div>
            </div>`;
        }).join('') : '<div style="text-align:center;color:#888;padding:15px;">暫無對賽紀錄</div>';
    }

    function exportCSV() {
        if(db.logs.length === 0 && db.players.length === 0) return alert("沒有數據可以匯出！");
        
        let csv = "\uFEFF單打個人統計\n球員,單打次數\n";
        db.players.forEach(p => csv += `${p},${db.singleTotals[p] || 0}\n`);

        csv += "\n總上場統計 (含雙打)\n球員,總次數\n";
        db.players.forEach(p => csv += `${p},${db.totals[p] || 0}\n`);

        csv += "\n單打對賽矩陣\n,";
        csv += db.players.join(",") + "\n";
        db.players.forEach(r => {
            csv += r + "," + db.players.map(c => r===c ? "-" : (db.vs[[r,c].sort().join(" v ")] || 0)).join(",") + "\n";
        });

        csv += "\n雙打搭檔排行\n組合,次數\n";
        Object.entries(db.pairs).forEach(e => csv += `"${e[0]}",${e[1]}\n`);

        csv += "\n全歷史紀錄\n時間,模式,P1,P2,P3,P4\n";
        db.logs.forEach(l => csv += `${l.time},${l.mode==='single'?'單打':'雙打'},${l.p1},${l.p2},${l.p3||''},${l.p4||''}\n`);
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `乒乓球數據_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    function clearAll() { if(confirm("確定清除所有球員及歷史紀錄？此操作無法還原！")) { localStorage.clear(); location.reload(); } }
    refresh();
</script>
</body>
</html>
